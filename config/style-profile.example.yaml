# jobtailor — Style Profile (EXAMPLE / fictional)
# Auto-generated by ingest_profile.py from an uploaded cover letter, then user-reviewed.
# Copy to config/style-profile.yaml (gitignored). Drives the VOICE of generated cover letters
# so they sound like the user, not generic AI. Optional: if this file is absent, the
# cover-letter step falls back to a neutral professional default.

language: "en"             # primary language detected; the letter still follows the offer's language
register: "formal"         # formal | semi-formal | conversational
person: "first"            # first | impersonal
tone: ["confident", "warm", "concise"]
sentence_length: "medium"  # short | medium | long
paragraph_count: 4
salutation: "Dear Hiring Manager,"
sign_off: "Kind regards,"
signature: "Alex Doe"

# Characteristic phrasings lifted from the user's own letter — used as soft style cues, NOT verbatim.
signature_phrases:
  - "what draws me to"
  - "I was glad to see"

# Anti-patterns to avoid (user dislikes / generic AI tells).
avoid:
  - "I am writing to apply for the position of"
  - "buzzword stuffing"

notes: "Opens with a company-specific hook; backs each claim with exactly one metric."
